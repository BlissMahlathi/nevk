services:
  - type: web
    name: nevk-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: nevk-backend.onrender.com
      - key: ADMIN_URL
        generateValue: true
      - key: ADMIN_ALLOWED_HOSTS
        value: nevk-backend.onrender.com
      - key: ADMIN_ALLOWED_IPS
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: nevk-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: nevk-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nevk-postgres
          property: password
      - key: DB_HOST
        fromDatabase:
          name: nevk-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: nevk-postgres
          property: port
      - key: DB_CONN_MAX_AGE
        value: "300"
      - key: WHITENOISE_MAX_AGE
        value: "31536000"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: SECURE_REFERRER_POLICY
        value: strict-origin-when-cross-origin
      - key: X_FRAME_OPTIONS
        value: DENY
      - key: WHATSAPP_ORDER_NUMBER
        value: "27715231720"
      - key: BG_REMOVAL_SERVICE_URL
        value: ""
      - key: BG_REMOVAL_SERVICE_TOKEN
        value: ""
      - key: BG_REMOVAL_TIMEOUT
        value: "25"

databases:
  - name: nevk-postgres
    plan: free
