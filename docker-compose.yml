services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nevk
      POSTGRES_USER: nevk_user
      POSTGRES_PASSWORD: nevk_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevk_user -d nevk"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  postgres_data:
